# Random-City-Challenge-public-
Random Taiwan City Challenge,  holidays going on !
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Roll 地方工具</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f9; padding-top: 50px; }
        .container { background: white; width: 300px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #result { font-size: 1.5em; color: #007bff; margin: 20px 0; min-height: 1.5em; font-weight: bold; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>今天去哪裡？</h2>
        <div id="result">準備好了嗎？</div>
        <button onclick="roll()">Roll 一個！</button>
    </div>

    <script>
        function roll() {
            const places = ["台北", "台中", "台南", "高雄", "花蓮", "宜蘭", "桃園", "新竹"];
            const result = document.getElementById('result');
            
            // 增加一點點抽獎閃爍感
            let count = 0;
            const interval = setInterval(() => {
                result.innerText = places[Math.floor(Math.random() * places.length)];
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    const finalPlace = places[Math.floor(Math.random() * places.length)];
                    result.innerText = "✨ " + finalPlace + " ✨";
                }
            }, 50);
        }
    </script>
</body>
</html>
