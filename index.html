⚡隨機選定要去哪裡吧!⚡<br>
(SORRY除了雙北外島)<br>
Random Taiwan City Challenge,  holidays going on !
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>⚡來隨機選定要去哪裡吧!(SORRY除了雙北外島)⚡</title>
    <style>
        body { font-family: sans-serif; text-align: center; background:#b3e6ff; padding-top: 50px; }
        .container { background: white; width: 500px; margin: auto; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #result { font-size: 1.5em; color: #007bff; margin: 20px 0; min-height: 1.5em; font-weight: bold; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-size: 1em; }
        button:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>💥霹靂旅行準備中!🌌</h2>
        <div id="result">準備好了嗎？☄️</div>
        <button onclick="roll()">命運！✨</button>
    </div>

    <script>
        function roll() {
            const places = ["桃園", "臺中", "臺南", "高雄", "花蓮", "宜蘭", "基隆", "新竹","臺東", "雲林", "屏東", "嘉義", "南投", "苗栗", "彰化"];
            const result = document.getElementById('result');
            
            // 增加一點點抽獎閃爍感
            let count = 0;
            const interval = setInterval(() => {
                result.innerText = places[Math.floor(Math.random() * places.length)];
                count++;
                if (count > 10) {
                    clearInterval(interval);
                    const finalPlace = places[Math.floor(Math.random() * places.length)];
                    result.innerText = "✨ " + finalPlace + " ✨";
                }
            }, 50);
        }
    </script>
</body>
</html>
